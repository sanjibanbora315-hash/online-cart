openapi: 3.0.3
info:
  title: Online Cart API
  description: |
    Comprehensive REST API for the Online Cart e-commerce platform.

    ## Overview
    This API provides endpoints for managing users, products, orders, and shopping carts
    in a microservices-based e-commerce system.

    ## Authentication
    Most endpoints require authentication via JWT Bearer token.
    Obtain a token by calling the `/api/users/login` endpoint.

    ## Rate Limiting
    API requests are rate-limited to 100 requests per minute per IP address.

    ## Error Handling
    All errors return a consistent JSON structure with `error`, `message`, and `timestamp` fields.

  version: 1.0.0
  contact:
    name: Online Cart Support
    email: support@onlinecart.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local Development (API Gateway)
  - url: http://localhost:8081
    description: User Service Direct
  - url: http://localhost:8082
    description: Product Service Direct
  - url: http://localhost:8083
    description: Order Service Direct

tags:
  - name: Authentication
    description: User authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Products
    description: Product catalog endpoints
  - name: Categories
    description: Product category endpoints
  - name: Cart
    description: Shopping cart endpoints
  - name: Orders
    description: Order management endpoints
  - name: Reviews
    description: Product review endpoints
  - name: Health
    description: Service health endpoints

paths:
  # ============================================================================
  # AUTHENTICATION ENDPOINTS
  # ============================================================================

  /api/users/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email verification
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
            example:
              username: johndoe
              email: john@example.com
              password: SecurePass123!
              firstName: John
              lastName: Doe
              phone: "+91-9876543210"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: john@example.com
              password: SecurePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate current session
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized

  /api/users/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /api/users/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent
        '404':
          description: User not found

  /api/users/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset password using token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Invalid or expired token

  # ============================================================================
  # USER ENDPOINTS
  # ============================================================================

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve user details by user ID
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found

    put:
      tags:
        - Users
      summary: Update user
      description: Update user profile information
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found

    delete:
      tags:
        - Users
      summary: Delete user
      description: Soft delete user account
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted
        '404':
          description: User not found

  /api/users/{id}/addresses:
    get:
      tags:
        - Users
      summary: Get user addresses
      description: List all addresses for a user
      operationId: getUserAddresses
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Addresses retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponse'

    post:
      tags:
        - Users
      summary: Add user address
      description: Add new address for a user
      operationId: addUserAddress
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'

  # ============================================================================
  # PRODUCT ENDPOINTS
  # ============================================================================

  /api/products:
    get:
      tags:
        - Products
      summary: List products
      description: Get paginated list of products with filtering
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, price, createdAt, -name, -price, -createdAt]
        - name: category
          in: query
          schema:
            type: integer
        - name: brand
          in: query
          schema:
            type: integer
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, DRAFT, INACTIVE]
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Products retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'

    post:
      tags:
        - Products
      summary: Create product
      description: Create a new product (Admin/Seller only)
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid input
        '403':
          description: Forbidden

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Retrieve product details
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '404':
          description: Product not found

    put:
      tags:
        - Products
      summary: Update product
      description: Update product details
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

    delete:
      tags:
        - Products
      summary: Delete product
      description: Soft delete a product
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted

  /api/products/search:
    get:
      tags:
        - Products
      summary: Search products
      description: Full-text search products
      operationId: searchProducts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'

  /api/products/{id}/inventory:
    patch:
      tags:
        - Products
      summary: Update inventory
      description: Update product inventory quantity
      operationId: updateInventory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                changeType:
                  type: string
                  enum: [PURCHASE, SALE, RETURN, ADJUSTMENT]
                notes:
                  type: string
      responses:
        '200':
          description: Inventory updated

  # ============================================================================
  # CATEGORY ENDPOINTS
  # ============================================================================

  /api/categories:
    get:
      tags:
        - Categories
      summary: List categories
      description: Get all categories with hierarchy
      operationId: listCategories
      parameters:
        - name: parentId
          in: query
          schema:
            type: integer
          description: Filter by parent category
        - name: includeInactive
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Categories retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'

    post:
      tags:
        - Categories
      summary: Create category
      description: Create new category (Admin only)
      operationId: createCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created

  # ============================================================================
  # CART ENDPOINTS
  # ============================================================================

  /api/orders/cart:
    get:
      tags:
        - Cart
      summary: Get cart
      description: Get current user's shopping cart
      operationId: getCart
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Cart retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'

    delete:
      tags:
        - Cart
      summary: Clear cart
      description: Remove all items from cart
      operationId: clearCart
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Cart cleared

  /api/orders/cart/items:
    post:
      tags:
        - Cart
      summary: Add item to cart
      description: Add product to shopping cart
      operationId: addToCart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
            example:
              userId: 1
              productId: 1
              variantId: 1
              quantity: 2
      responses:
        '201':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Invalid request or insufficient stock

  /api/orders/cart/items/{itemId}:
    put:
      tags:
        - Cart
      summary: Update cart item
      description: Update quantity of cart item
      operationId: updateCartItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Cart item updated

    delete:
      tags:
        - Cart
      summary: Remove cart item
      description: Remove item from cart
      operationId: removeCartItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item removed

  # ============================================================================
  # ORDER ENDPOINTS
  # ============================================================================

  /api/orders:
    get:
      tags:
        - Orders
      summary: List orders
      description: Get paginated list of orders
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Orders retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'

    post:
      tags:
        - Orders
      summary: Create order
      description: Create order from cart
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              userId: 1
              shippingAddressId: 1
              billingAddressId: 1
              shippingMethod: EXPRESS
              paymentMethod: CREDIT_CARD
              couponCode: WELCOME10
              customerNotes: "Please deliver after 5 PM"
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Invalid request or cart is empty

  /api/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieve order details
      operationId: getOrderById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailResponse'
        '404':
          description: Order not found

    delete:
      tags:
        - Orders
      summary: Cancel order
      description: Cancel a pending order
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Order cancelled
        '400':
          description: Order cannot be cancelled

  /api/orders/{id}/status:
    patch:
      tags:
        - Orders
      summary: Update order status
      description: Update order status (Admin only)
      operationId: updateOrderStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [CONFIRMED, PROCESSING, SHIPPED, OUT_FOR_DELIVERY, DELIVERED, CANCELLED]
                trackingNumber:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Status updated

  # ============================================================================
  # REVIEW ENDPOINTS
  # ============================================================================

  /api/products/{productId}/reviews:
    get:
      tags:
        - Reviews
      summary: Get product reviews
      description: Get reviews for a product
      operationId: getProductReviews
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: rating
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: Reviews retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewPageResponse'

    post:
      tags:
        - Reviews
      summary: Create review
      description: Add review for a purchased product
      operationId: createReview
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '201':
          description: Review created
        '400':
          description: Product not purchased

  # ============================================================================
  # HEALTH ENDPOINTS
  # ============================================================================

  /actuator/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Service health status
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

# ============================================================================
# COMPONENTS
# ============================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # -------------------------------------------------------------------------
    # Authentication Schemas
    # -------------------------------------------------------------------------

    UserRegistrationRequest:
      type: object
      required:
        - username
        - email
        - password
        - firstName
        - lastName
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, number, and special character
        firstName:
          type: string
          maxLength: 50
        lastName:
          type: string
          maxLength: 50
        phone:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
        user:
          $ref: '#/components/schemas/UserResponse'

    # -------------------------------------------------------------------------
    # User Schemas
    # -------------------------------------------------------------------------

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [USER, ADMIN, SELLER]
        status:
          type: string
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserUpdateRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string

    AddressRequest:
      type: object
      required:
        - recipientName
        - addressLine1
        - city
        - postalCode
        - country
      properties:
        addressType:
          type: string
          enum: [SHIPPING, BILLING, BOTH]
        isDefault:
          type: boolean
        recipientName:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        landmark:
          type: string

    AddressResponse:
      allOf:
        - $ref: '#/components/schemas/AddressRequest'
        - type: object
          properties:
            id:
              type: integer
              format: int64

    # -------------------------------------------------------------------------
    # Product Schemas
    # -------------------------------------------------------------------------

    ProductCreateRequest:
      type: object
      required:
        - sku
        - name
        - price
      properties:
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        brandId:
          type: integer
          format: int64
        price:
          type: number
          format: double
        compareAtPrice:
          type: number
          format: double
        costPrice:
          type: number
          format: double
        quantity:
          type: integer
        weight:
          type: number
        status:
          type: string
          enum: [DRAFT, ACTIVE, INACTIVE]
        isFeatured:
          type: boolean

    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        price:
          type: number
          format: double
        quantity:
          type: integer
        status:
          type: string
        isFeatured:
          type: boolean

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
